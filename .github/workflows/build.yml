name: Docker
on:
  workflow_dispatch:
  push:
    branches: [main, master, dev, test]
    tags: ['v*']
permissions:
  contents: read
  packages: write
jobs:
  docker:
    strategy:
      matrix:
        include:
          - image: ghcr.io/hanzoai/visor
            target: STANDARD
          - image: ghcr.io/hanzoai/visor-allinone
            target: ALLINONE
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ${{ matrix.image }}
      target: ${{ matrix.target }}
    secrets: inherit
